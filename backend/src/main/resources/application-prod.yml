jwt:
  secret: ${JWT_SECRET}
  expireDate:
    accessToken: 3600000
    refreshToken: 1209600000

app:
  spring-api-url: ${SPRING_API_URL}
  club-frontend-url: ${CLUB_FRONTEND_URL}
  public-frontend-url: ${PUBLIC_FRONTEND_URL}

asset-management:
  time-zone: ${ASSET_MANAGEMENT_TIME_ZONE:Asia/Seoul}
  account-viewer:
    team-name: ${ASSET_ACCOUNT_VIEWER_TEAM_NAME:자산운용}
    allow-system-admin: ${ASSET_ACCOUNT_ALLOW_SYSTEM_ADMIN:false}

kiwoom:
  api:
    base-url: ${KIWOOM_API_BASE_URL:https://api.kiwoom.com}
    app-key: ${KIWOOM_APP_KEY:}
    app-secret: ${KIWOOM_APP_SECRET:}
    token-expiry-zone: ${KIWOOM_TOKEN_EXPIRY_ZONE:Asia/Seoul}
    token-refresh-skew-seconds: ${KIWOOM_TOKEN_REFRESH_SKEW_SECONDS:300}
    timeout:
      connect-ms: ${KIWOOM_CONNECT_TIMEOUT_MS:3000}
      response-ms: ${KIWOOM_RESPONSE_TIMEOUT_MS:5000}
      block-ms: ${KIWOOM_BLOCK_TIMEOUT_MS:7000}
    pagination:
      max-pages: ${KIWOOM_MAX_PAGES:20}
    rate-limit:
      max-concurrent: ${KIWOOM_MAX_CONCURRENT_REQUESTS:3}
      min-interval-ms: ${KIWOOM_MIN_INTERVAL_MS:100}

email:
  code:
    charset: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"
    length: 6

logging:
  level:
    org.hibernate.SQL: DEBUG

spring:
  config:
    activate:
      on-profile: prod

  application:
    name: Sejong-ISC-Backend

  jpa:
    open-in-view: false   # 커넥션을 쿼리 실행 직후 즉시 반납하게 함

  # DB (Postgres) - 도커가 주입해주는 환경변수 사용
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}           # .env의 DB_URL 값
    username: ${DB_USERNAME} # .env의 DB_USERNAME 값
    password: ${DB_PASSWORD} # .env의 DB_PASSWORD 값
    hikari:
      pool-name: HikariPool
      maximum-pool-size: ${DB_POOL_MAX:30} # t2.micro는 커넥션 풀 작게 유지
      minimum-idle: 10

  data:
    redis:
      host: redis
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  security:
    user:
      name: ${SBA_ADMIN_NAME}
      password: ${SBA_ADMIN_PASSWORD}

  boot:
    admin:
      context-path: /admin/dev
      client:
        url: "http://localhost:8080/admin/dev"
        username: ${SBA_ADMIN_NAME}
        password: ${SBA_ADMIN_PASSWORD}

        instance:
          name: sisc-backend
          service-base-url: "http://localhost:8080"
          management-base-url: "http://localhost:8080"
          metadata:
            user:
              name: ${SBA_ADMIN_NAME}
              password: ${SBA_ADMIN_PASSWORD}
