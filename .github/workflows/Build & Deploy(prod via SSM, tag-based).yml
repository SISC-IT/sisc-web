name: Build & Deploy Prod (SSH & Tag-based)

on:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-prod
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BACK: ghcr.io/sisc-it/sisc-web-back
  IMAGE_FRONT: ghcr.io/sisc-it/sisc-web-front
  IMAGE_XAI: ghcr.io/sisc-it/sisc-web-xai

jobs:
  build-back:
    runs-on: ubuntu-latest
    environment: production
    permissions: { contents: read, packages: write }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push (backend)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACK }}:${{ github.ref_name }}
            ${{ env.IMAGE_BACK }}:latest

  build-front:
    runs-on: ubuntu-latest
    environment: production
    permissions: { contents: read, packages: write }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push (frontend)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_FRONT }}:${{ github.ref_name }}
            ${{ env.IMAGE_FRONT }}:latest
          build-args: |
            VITE_API_URL=${{ secrets.SPRING_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-xai:
    runs-on: ubuntu-latest
    environment: production
    permissions: { contents: read, packages: write }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push (xai)
        uses: docker/build-push-action@v6
        with:
          context: ./AI
          file: ./AI/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_XAI }}:${{ github.ref_name }}
            ${{ env.IMAGE_XAI }}:latest

  deploy:
    needs: [build-back, build-front, build-xai]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Make .env file for Prod
        run: |
          echo "SPRING_PROFILES_ACTIVE=prod" > .env
          echo "TAG=${{ github.ref_name }}" >> .env

          echo "DB_URL=${{ secrets.DB_URL }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env

          echo "SPRING_API_URL=${{ secrets.SPRING_API_URL }}" >> .env
          echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> .env
          echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
          echo "SBA_ADMIN_NAME=${{ secrets.SBA_ADMIN_NAME }}" >> .env
          echo "SBA_ADMIN_PASSWORD=${{ secrets.SBA_ADMIN_PASSWORD }}" >> .env

      - name: SCP Transfer (docker-compose.yml & .env)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.yml, .env"
          target: "/home/${{ secrets.SSH_USER }}/app/sisc-web/"

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/app/sisc-web

            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_READ_USER }} --password-stdin

            docker compose pull api web redis npm
            docker compose up -d --remove-orphans api web redis npm db

            XAI_RELEASE_IMAGE="${{ env.IMAGE_XAI }}:${{ github.ref_name }}"
            XAI_LOCAL_IMAGE="${{ env.IMAGE_XAI }}:latest"

            docker pull "$XAI_RELEASE_IMAGE"
            docker tag "$XAI_RELEASE_IMAGE" "$XAI_LOCAL_IMAGE"

            CURRENT_XAI_IMAGE_ID="$(docker image inspect "$XAI_LOCAL_IMAGE" --format '{{.Id}}')"

            docker image ls --no-trunc --format '{{.Repository}}:{{.Tag}} {{.ID}}' "${{ env.IMAGE_XAI }}" | while read -r image_ref image_id; do
              [ -n "$image_ref" ] || continue
              [ -n "$image_id" ] || continue

              if [ "$image_id" != "$CURRENT_XAI_IMAGE_ID" ]; then
                docker rmi -f "$image_id" >/dev/null 2>&1 || true
              fi
            done

            docker image prune -f

            if docker ps --format '{{.Names}}' | grep -q "^api$"; then
              echo "Waiting for api to be healthy..."
              for i in {1..30}; do
                status=$(docker inspect --format='{{json .State.Health.Status}}' api 2>/dev/null || echo '"none"')
                if echo "$status" | grep -q healthy; then
                  echo "=== Production server is healthy ==="
                  break
                fi
                sleep 2
              done
            fi
